[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[redirects]]
  from = "/thank-you"
  to = "/thank-you/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
